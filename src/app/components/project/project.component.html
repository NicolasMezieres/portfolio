<article class="flex flex-col items-center gap-5 pb-10 sm:px-20">
  <h2 class="text-2xl font-semibold">{{ titleProject() }}</h2>
  <img
    [src]="imagePath()"
    [alt]="textAlt()"
    class="rounded-2xl border border-dark"
  />
  <ul class="flex gap-1.5 flex-wrap justify-center">
    @for (stack of stackList(); track $index) {
      <li>{{ stack }}</li>
    }
  </ul>
  <h3 class="font-semibold text-xl">Description</h3>
  <p
    class="text-dark bg-oldLace border border-dark rounded-2xl p-4 shadow-[0_5px_5px_#17183B80]"
    [innerHTML]="description()"
  ></p>
  <section class="flex gap-10 pt-5">
    @for (link of links(); track $index) {
      <a
        [href]="link.link"
        [ariaLabel]="link.text"
        target="_blank"
        class="text-dark bg-oldLace p-2.5 text-xl rounded-2xl border border-dark  {{
          isDark()
            ? 'shadow-[0_3px_3px_#F18046]'
            : 'shadow-[0_4px_4px_#17183Bb0]'
        }}"
        >{{ link.text }}</a
      >
    }
  </section>
</article>
